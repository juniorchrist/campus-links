services:
  - type: web
    name: campus-link
    env: node
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: campus-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: campus-db
    plan: free
